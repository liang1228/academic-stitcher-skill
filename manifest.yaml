name: academic-stitcher-skill
version: 2.1.2
description: >
  Declarative router for the structured Academic Stitcher skill flow.
  SKILL.md uses this manifest to load only the core files and fragments
  needed for the current paper-stitching, writing, polishing, review, or
  Ctx2Skill-style self-evaluation task.

always_load:
  - static/core/stance.md
  - static/core/workflow.md
  - static/core/quality-gates.md
  - static/core/output-format.md

axes:
  route:
    detect: |
      Decide the main work mode. Use stitch-plan for idea/module/story planning,
      section-draft for writing or rebuilding manuscript sections, nature-polish
      for polishing/restructuring existing prose, reviewer-audit for pre-submission
      critique, full-pipeline when the user asks for an end-to-end path, and
      ctx2skill-audit when the user asks to evaluate, distill, regression-test,
      or optimize this skill itself using Ctx2Skill/self-play logic.
    values:
      stitch-plan:     static/fragments/route/stitch-plan.md
      section-draft:   static/fragments/route/section-draft.md
      nature-polish:   static/fragments/route/nature-polish.md
      reviewer-audit:  static/fragments/route/reviewer-audit.md
      full-pipeline:   static/fragments/route/full-pipeline.md
      ctx2skill-audit: static/fragments/route/ctx2skill-audit.md
    default: stitch-plan
    multi: false

  paper_type:
    detect: |
      Decide the paper logic. Default to research. Use proposal-thesis for
      opening reports, graduate theses, advisor plans, or graduation-focused work.
    values:
      research:          static/fragments/paper_type/research.md
      methods:           static/fragments/paper_type/methods.md
      algorithmic:       static/fragments/paper_type/algorithmic.md
      review:            static/fragments/paper_type/review.md
      proposal-thesis:   static/fragments/paper_type/proposal-thesis.md
    default: research
    multi: false

  section:
    detect: |
      Identify the manuscript section being drafted, polished, or audited.
      Multiple sections are allowed. Skip only when the request is a pure plan.
    values:
      title:          static/fragments/section/title.md
      abstract:       static/fragments/section/abstract.md
      introduction:   static/fragments/section/introduction.md
      related-work:   static/fragments/section/related-work.md
      method:         static/fragments/section/method.md
      experiments:    static/fragments/section/experiments.md
      discussion:     static/fragments/section/discussion.md
      conclusion:     static/fragments/section/conclusion.md
    multi: true

  language:
    detect: |
      Use zh-cn when the source notes, desired explanation, or final output are
      Chinese or mixed Chinese-English. Use en when the user requests English
      manuscript prose or English documentation.
    values:
      zh-cn:   static/fragments/language/zh-cn.md
      en:      static/fragments/language/en.md
    default: zh-cn
    multi: false

references:
  on_demand:
    - condition: needs paper matrix fields, grey vocabulary, graduate workflow, opening report, SCI skeleton, fair evidence rules, or red flags
      path: references/playbook.md
    - condition: needs Codex-suite style writing routes, reviewer-panel passes, checkpoints, or detailed section moves
      path: references/writing-suite.md
    - condition: user asks what was distilled from the Bilibili transcripts/videos or needs source-informed heuristics
      path: references/transcript-derived-playbook.md
    - condition: user asks to evaluate, maintain, distill, regression-test, or optimize this skill itself with Ctx2Skill-style loops
      path: references/ctx2skill-evaluation.md
